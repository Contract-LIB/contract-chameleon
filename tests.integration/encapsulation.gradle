
// List to store all creatd tasks
def encapsulaiton_tests = []

// LinkedCellList example
createVerifastPipeline(
  "encapsulation-linked_cell_list",
  "verifast-applicant",
  "./export/encapsulation-example/LinkedCellList.clib",
  "./export/encapsulation-example/verifast_replacement.toml"
).each { t -> encapsulaiton_tests << t }

createVerifastPipeline(
  "encapsulation-linked_cell_list",
  "verifast-provider",
  "./export/encapsulation-example/LinkedCellList.clib",
  "./export/encapsulation-example/verifast_replacement.toml"
).each { t -> encapsulaiton_tests << t }


// Full run
tasks.register('it-encapsulation-example') {
    group = "Integration Tests"
    description = "Run all task of the encapsulaiton example"

    dependsOn encapsulaiton_tests
}
