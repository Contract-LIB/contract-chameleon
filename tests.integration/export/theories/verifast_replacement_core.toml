    //@ assert eq_2;
    boolean eq_3 = w3.check_equals();
    //@ assert !eq_3;
    boolean eq_4 = w4.check_equals();
    //@ assert !eq_4;


    boolean dis_1 = w.check_distinct();
    //@ assert !dis_1;
    boolean dis_2 = w2.check_distinct();
    //@ assert !dis_2;
    boolean dis_3 = w3.check_distinct();
    //@ assert dis_3;
    boolean dis_4 = w4.check_distinct();
    //@ assert dis_4;


    boolean not_1 = w.check_not();
    //@ assert !not_1;
