[example_test_core.BooleanWrapper]
body = "private boolean valueA,valueB,valueC;"
pred = "= valueA |-> a &*& valueB |-> b &*& valueC |-> c"
init = """

      this.valueA = true;
      this.valueB = true;
      this.valueC = true;
"""
init_values = """

      this.valueA = x;
      this.valueB = y;
      this.valueC = z;
"""

get_a = "return this.valueA;"
check_equals = "return this.valueA == this.valueB;"
check_distinct = "return this.valueA != this.valueB;"
check_not = "return !this.valueA;"
check_implies = "return !this.valueA || this.valueB;"
check_and = "return this.valueA && this.valueB;"
check_or = "return this.valueA || this.valueB;"
check_xor = "return !(this.valueA || this.valueB);"
check_ite = "return this.valueA ? x : y;"
file = ""

[example._Client]

file = """
package example_test_core;

public class _Client {

  public static void main(String[] args) 
  //@ requires true;
  //@ ensures true;
  {
    BooleanWrapper w = BooleanWrapper.init();
    BooleanWrapper w2 = BooleanWrapper.init_values(false, false, false);
    BooleanWrapper w3 = BooleanWrapper.init_values(true, false, false);
    BooleanWrapper w4 = BooleanWrapper.init_values(false, true, false);

    boolean w_a = w.get_a();
    //@ assert w_a;

    boolean w2_a = w2.get_a();
    //@ assert !w2_a;


    boolean eq_1 = w.check_equals();
    //@ assert eq_1;
