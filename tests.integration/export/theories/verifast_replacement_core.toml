    //@ assert imp_2;
    boolean imp_3 = w3.check_implies();
    //@ assert !imp_3;
    boolean imp_4 = w4.check_implies();
    //@ assert imp_4;

    boolean and_1 = w.check_and();
    //@ assert and_1;
    boolean and_2 = w2.check_and();
    //@ assert !and_2;
    boolean and_3 = w3.check_and();
    //@ assert !and_3;
    boolean and_4 = w4.check_and();
    //@ assert !and_4;

    boolean or_1 = w.check_or();
    //@ assert or_1;
