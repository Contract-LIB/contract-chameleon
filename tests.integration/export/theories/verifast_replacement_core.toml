    boolean ite_1f = w.check_ite(false, true);
    //@ assert !ite_1f;
    boolean ite_2 = w2.check_ite(true, false);
    //@ assert !ite_2;
    boolean ite_2f = w2.check_ite(false, true);
    //@ assert ite_2f;
  }
}
"""
