[example.Stack]
body = """

    private int[] comp;
    private int size;
    private final int MAX_SIZE = 1000;"""

pred = "= comp |-> ?c &*& size |-> ?s &*& array_slice(c, 0, s, absVal) &*& array_slice(c, s, 1000, _) &*&s == length(absVal)"

init = """

      this.comp = new int[MAX_SIZE];
      this.size = 0;"""

peek = """

      //@ not_empty_list(this_absVal);
      //@ array_slice_split(comp, 0, this.size - 1);
      return this.comp[this.size-1];"""

push = """

      this.comp[this.size] = v;
      this.size++;"""

pop = """

        //@ not_empty_list(this_absVal_old);
        //@ array_slice_split(comp, 0, this.size - 1);
        this.size--;"""

reset = "this.size = 0;"

