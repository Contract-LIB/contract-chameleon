[example._Client]

file = """
package example;

public class _Client {

  public static void main(String[] args) 
  //@ requires true;
  //@ ensures true;
  {
    testStack();
  }

  public static void testStack() 
  //@ requires true;
  //@ ensures true;
  {
    Stack c1 = Stack.init();
    //@ assert c1.pred(nil);
    c1.push(0);
    //@ assert c1.pred(cons(0, nil));
    
    int r1 = c1.peek();
    //@ assert c1.pred(cons(0, nil));
    //@ assert r1 == 0;

    c1.push(1);
    //@ assert c1.pred(cons(0, cons(1, nil)));

    int r2 = c1.peek();
    //@ assert c1.pred(cons(0, cons(1, nil)));
    //@ assert r2 == 1;

    c1.push(2);
    //@ assert c1.pred(cons(0, cons(1, cons(2, nil))));

    int r3 = c1.peek();
    //@ assert c1.pred(cons(0, cons(1, cons(2, nil))));
    //@ assert r3 == 2;

    c1.pop();
    //@ assert c1.pred(cons(0, cons(1, nil)));

    int r4 = c1.peek();
    //@ assert c1.pred(cons(0, cons(1, nil)));
    //@ assert r4 == 1;

    c1.reset();
    //@ assert c1.pred(nil);
  }
}
