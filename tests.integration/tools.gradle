buildscript {
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath 'org.apache.groovy:groovy-toml:5.0.5'
    }
}

import groovy.json.JsonSlurper
import groovy.toml.TomlSlurper

// ===== Importing the generated files into the tools

// - Check that the tools for the integration tests exist
//   - KeY
//   - CI for KeY
//   - VeriFast

tasks.register('check-tools-files') {

  group = "Help"
  description = "Check if all tools (verifast, key, key-ci) are available."

  println "===="
  println "Integration Test Setup:"
  println "Root dir: ${rootProject.rootDir}"
  println "Project dir: ${project.projectDir}"
  println "----"

  def key = project.findProperty("custom_key_exe") ?: contract_chameleon_key_exe
  def ci_key = project.findProperty("custom_key_exe") ?: contract_chameleon_ci_key_exe
  def verifast = project.findProperty("custom_verifast_exe") ?: contract_chameleon_verifast_exe

  //println "Default KeY executable: $contract_chameleon_key_exe"
  //println "Default VeriFast executable: $contract_chameleon_verifast_exe"
  //println "Default CI Tool executable: $contract_chameleon_ci_key_exe"

  //println "Using $key"
  //println "Using $ci_key"
  //println "Using $verifast"

  def key_file = new File(rootProject.rootDir, key)
  def ci_key_file = new File(rootProject.rootDir, ci_key)
  def verifast_file = new File(rootProject.rootDir, verifast)

  println key_file.exists() ? "✅ KeY exists: ${key_file.absolutePath}" : "❌ KeY not found: ${key_file.absolutePath}"
  println ci_key_file.exists() ? "✅ KeY CI exists: ${ci_key_file.absolutePath}" : "❌ KeY CI not found: ${ci_key_file.absolutePath}"
  println verifast_file.exists() ? "✅ VeriFast exists: ${verifast_file.absolutePath}" : "❌ VeriFast not found: ${verifast_file.absolutePath}"

  println "===="
}

tasks.register("help-verifast", Exec) {
  def verifast = project.findProperty("custom_verifast_exe") ?: contract_chameleon_verifast_exe
  def verifast_file = new File(rootProject.rootDir, verifast)

  group = "Help"
  description = "Run the help command of verifast."

  commandLine verifast_file.absolutePath, "--help"

  dependsOn 'check-tools-files'
}

ext.runVerifast = { String taskName, List<String> argList ->

  tasks.register(taskName, Exec) {
    def verifast = project.findProperty("custom_verifast_exe") ?: contract_chameleon_verifast_exe
    def verifast_file = new File(rootProject.rootDir, verifast)

    group = "Integration Tests Verifast"
    description = "Call the geneated code in verifast."

    executable verifast_file.absolutePath
    args(argList)

    dependsOn 'check-tools-files'
  }
}

tasks.register("help-key-ci", Exec) {
  def key = project.findProperty("custom_key_exe") ?: contract_chameleon_key_exe
  def ci_key = project.findProperty("custom_key_exe") ?: contract_chameleon_ci_key_exe
  def key_file = new File(rootProject.rootDir, key)
  def ci_key_file = new File(rootProject.rootDir, ci_key)
  
  group = "Help"
  description = "Run the help command of key ci."

  commandLine "java", "-cp", "$ci_key_file:$key_file", "io.github.wadoon.keycitool.CheckerKt", "--help"

  dependsOn 'check-tools-files'
}

tasks.register("help-key", Exec) {

  def key = project.findProperty("custom_key_exe") ?: contract_chameleon_key_exe
  def key_file = new File(rootProject.rootDir, key)

  group = "Help"
  description = "Run the help command of key."

  commandLine "java", "-jar", key_file.absolutePath, "--help"
  ignoreExitValue = true

  dependsOn 'check-tools-files'
}

tasks.register("help--all") {
  group = "Help"
  description = "Run the help command of all tools."
  dependsOn 'run-help-key', 'run-help-key-ci', 'run-help-verifast'
}

// Replace function

ext.replaceWithImpl = {String taskName, String source, String destination, String replacementSource -> 
  tasks.register(taskName, Copy) {

    def jsonFile = file(replacementSource)

    inputs.file(jsonFile)

    def sourceLocation = layout.buildDirectory.dir(source)
    def destinationLocation = layout.buildDirectory.dir(destination)

    from(sourceLocation)
    into(destinationLocation)

    //outputs.dir(layout.buildDirectory.dir(destination)) 

    group = "Integration Tests Copy / Replace"
    description = "Moves the created integration test source files and fills in the user implmentation."
    
    def replacements = [:]
    doFirst {

        def conf = new TomlSlurper().parse(jsonFile)
        conf.each { packageKey, classes -> 
          classes.each { classKey, values ->
              values.each { tag, value ->
              //replacements["${packageKey}.${classKey}.${tag}"] = value
                //println("${packageKey}.${classKey}.${tag} = ${value}")
                //println()
                replacements["${packageKey}.${classKey}.${tag}"] = value
              }
             //subvalue.each { tag, value ->
              //replacements["${packageKey}.${classKey}.${tag}"] = value
              //print("${packageKey}.${classKey}.${tag}")
            //}
          }
        }

        replacements.each{ key, v -> 
          println(key)
        }
        //replacements =  new JsonSlurper().parse(jsonFile)
    }

    filter { String line ->
        //Singleline comment: // TODO: Implement 'example.Cell.init'.
        replacements.each { key, value ->
            def target = "// TODO: Implement '${key}'."
            //println(target)
            if (line.contains(target)) {
                line = line.replace(target, value)
            }
        }
        //Inline comment: /* TODO: Implement 'example.Cell.pred'. */
        replacements.each { key, value ->
        
            def target = "/* TODO: Implement '${key}'. */"
            if (line.contains(target)) {
                line = line.replace(target, value)
            }
        }
        return line
    }
  }
}

// Create Client
ext.createClient = { String taskName, String destination, String clientPackage, String clientName -> 
  tasks.register(taskName) {

      def clientFile = layout.buildDirectory
        .dir(destination)
        .map { it.dir(clientPackage.replace('.', '/')) }
        .map { it.file("${clientName}.java") }
        .get().asFile


      def sourcesFile = layout.buildDirectory
        .dir(destination)
        .map { it.file("sources.jarsrc") }
        .get().asFile

      doLast {
          clientFile.parentFile.mkdirs()
          clientFile.text = "// TODO: Implement '${clientPackage}.${clientName}.file'."
          sourcesFile << "${clientPackage.replace('.','/')}/${clientName}.java"
      }
  }
}
